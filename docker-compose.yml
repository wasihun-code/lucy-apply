services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: lucy_apply
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: gunicorn lucy_apply.wsgi:application --bind 0.0.0.0:8080
    ports:
      - "8001:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/lucy_apply
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-not-for-production
      DEBUG: "False"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY}

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: celery -A lucy_apply worker --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/lucy_apply
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-not-for-production
      DEBUG: "False"
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: >
      sh -c "rm -f celerybeat-schedule celerybeat-schedule.db &&
             celery -A lucy_apply beat --loglevel=info --schedule=/tmp/celerybeat-schedule"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/lucy_apply
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-not-for-production
      DEBUG: "False"
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8001/api/v1/
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      API_URL: http://backend:8080/api/v1/

  frontend-test:
    image: node:20-slim
    working_dir: /app
    command: npx vitest run --reporter=verbose
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    environment:
      API_URL: http://backend:8080/api/v1/
      NEXT_PUBLIC_API_URL: http://localhost:8001/api/v1/

volumes:
  postgres_data:
