name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: lucy_apply
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Django system checks
        run: python manage.py check
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/lucy_apply
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key
          DEBUG: "False"
          STRIPE_SECRET_KEY: sk_test_ci_dummy_key
          STRIPE_WEBHOOK_SECRET: whsec_ci_dummy_key
          STRIPE_PUBLIC_KEY: pk_test_ci_dummy_key

      - name: Run tests
        run: pytest --tb=short
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/lucy_apply
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key
          DEBUG: "False"
          STRIPE_SECRET_KEY: sk_test_ci_dummy_key
          STRIPE_WEBHOOK_SECRET: whsec_ci_dummy_key
          STRIPE_PUBLIC_KEY: pk_test_ci_dummy_key
